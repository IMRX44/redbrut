name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" \
            -o redbrut-linux-amd64 \
            ./cmd/redbrut-linux/

      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" \
            -o redbrut-linux-arm64 \
            ./cmd/redbrut-linux/

      - name: Create checksums
        run: |
          sha256sum redbrut-linux-amd64 redbrut-linux-arm64 > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: redbrut ${{ github.event.inputs.version }}
          body: |
            ## redbrut ${{ github.event.inputs.version }}

            High-performance RDP credential testing tool written in Go.

            ### Downloads
            | File | Platform | Arch |
            |------|----------|------|
            | `redbrut-linux-amd64` | Linux | x86_64 |
            | `redbrut-linux-arm64` | Linux | ARM64 |

            > **Windows:** Build from source with `go build ./cmd/redbrut-windows/` on a Windows machine with MinGW.

            ### What's new
            - Custom NLA/CredSSP handshake — pure Go, no FreeRDP
            - NTLMv2 with full Unicode support (Russian/Chinese passwords)
            - 5,000+ goroutines vs NLBrute's 500 OS threads
            - NTSTATUS-based result classification — no false negatives
            - Interactive bubbletea TUI on Linux
            - Dark-themed fyne GUI on Windows
            - Resume support, per-IP rate limiting, password spray mode

            ### Usage
            ```bash
            chmod +x redbrut-linux-amd64
            ./redbrut-linux-amd64
            ```
          files: |
            redbrut-linux-amd64
            redbrut-linux-arm64
            checksums.txt
          draft: false
          prerelease: false
