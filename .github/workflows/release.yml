name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Build Linux amd64
        run: |
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" \
            -o redbrut-linux-amd64 ./cmd/redbrut-linux/

      - name: Build Linux arm64
        run: |
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" \
            -o redbrut-linux-arm64 ./cmd/redbrut-linux/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: redbrut-linux-*

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install build dependencies
        run: |
          choco install mingw -y --no-progress
          refreshenv

      - name: Build Windows amd64
        shell: cmd
        run: |
          set CGO_ENABLED=1
          set GOOS=windows
          set GOARCH=amd64
          go build -ldflags="-s -w -H windowsgui" -o redbrut-windows-amd64.exe ./cmd/redbrut-windows/

      - uses: actions/upload-artifact@v4
        with:
          name: windows-binaries
          path: redbrut-windows-*.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: linux-binaries

      - uses: actions/download-artifact@v4
        with:
          name: windows-binaries

      - name: Create checksums
        run: sha256sum redbrut-linux-amd64 redbrut-linux-arm64 redbrut-windows-amd64.exe > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: redbrut ${{ github.event.inputs.version }}
          body: |
            ## redbrut ${{ github.event.inputs.version }}

            High-performance RDP credential testing tool written in Go.

            ### Downloads
            | File | Platform | Arch |
            |------|----------|------|
            | `redbrut-linux-amd64` | Linux | x86_64 |
            | `redbrut-linux-arm64` | Linux | ARM64 |
            | `redbrut-windows-amd64.exe` | Windows | x86_64 |

            ### Highlights
            - Pure Go NLA/CredSSP — no FreeRDP dependency
            - NTLMv2 with UTF-16LE encoding — Russian/Chinese/Arabic passwords work
            - 5,000 goroutines vs NLBrute's 500 OS threads
            - NTSTATUS classification — zero false negatives
            - Interactive bubbletea TUI (Linux) + dark fyne GUI (Windows)
            - Per-IP rate limiting, resume support, password spray mode
          files: |
            redbrut-linux-amd64
            redbrut-linux-arm64
            redbrut-windows-amd64.exe
            checksums.txt
